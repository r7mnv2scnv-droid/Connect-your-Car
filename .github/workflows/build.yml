name: Build iOS App
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app
    - name: Build IPA
      run: |
        xcodebuild -archivePath ./build/App.xcarchive archive -project *.swiftpm -scheme App
        xcodebuild -exportArchive -archivePath ./build/App.xcarchive -exportPath ./build/Export -exportOptionsPlists ExportOptions.plist
