name: Build iOS App
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app
      
    - name: Unzip Project
      run: |
        unzip -o *.zip
        
    - name: Build App
      run: |
        # Findet den .swiftpm Ordner
        IFS=$'\n'
        SWFTPM_DIR=$(find . -name "*.swiftpm" -type d | head -n 1)
        echo "Wechsle in Projektordner: $SWFTPM_DIR"
        
        # Wir gehen direkt IN den Ordner hinein, um Namensprobleme zu vermeiden
        cd "$SWFTPM_DIR"
        
        # Erstellt die Build-Struktur
        mkdir -p build/Payload
        
        # Nutzt den korrekten Swift-Package-Compiler für Playgrounds
        xcrun swift build -c release --triple arm64-apple-ios
        
        # Sucht die gebaute .app-Datei im versteckten .build-Ordner
        APP_PATH=$(find .build -name "*.app" -type d | head -n 1)
        
        # Falls Xcode es woanders abgelegt hat, suchen wir global im Ordner
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find . -name "*.app" -type d | head -n 1)
        fi
        
        echo "Gefundene App-Datei: $APP_PATH"
        cp -R "$APP_PATH" build/Payload/
        
        # Verpacken als IPA
        cd build
        zip -r ../../App.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iPhone-App
        path: App.ipa
