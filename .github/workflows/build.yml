name: Build iOS App
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app
      
    - name: Unzip Project
      run: |
        unzip -o *.zip
        
    - name: Build App
      run: |
        # Findet das Projekt, egal wie viele Leerzeichen im Namen sind
        IFS=$'\n'
        SWFTPM_DIR=$(find . -name "*.swiftpm" -type d | head -n 1)
        echo "Kompiliere Projekt: $SWFTPM_DIR"
        
        # Erstellt den Build-Ordner
        mkdir -p build/Payload
        
        # Baut das Projekt direkt als ausführbare App
        xcodebuild build -project "$SWFTPM_DIR" -scheme App -configuration Release -derivedDataPath ./derivedData
        
        # Sucht die fertige .app Datei und packt sie in den Payload-Ordner für das iPhone
        APP_PATH=$(find ./derivedData -name "*.app" -type d | head -n 1)
        cp -R "$APP_PATH" build/Payload/
        
        # Verwandelt den Ordner in eine echte .ipa Datei
        cd build
        zip -r App.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iPhone-App
        path: build/App.ipa
