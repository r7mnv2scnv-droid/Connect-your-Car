name: Build iOS App
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app
      
    - name: Unzip Project
      run: |
        unzip -o *.zip
        
    - name: Build App
      run: |
        # Findet den .swiftpm Ordner
        IFS=$'\n'
        SWFTPM_DIR=$(find . -name "*.swiftpm" -type d | head -n 1)
        echo "Projekt gefunden unter: $SWFTPM_DIR"
        
        # Erstellt die Ordnerstruktur für die spätere Installation
        mkdir -p build/Payload
        
        # Baut das Playground-Projekt direkt über Xcode mit dem korrekten SDK
        # Das umgeht den "AppleProductTypes" Fehler komplett!
        xcodebuild archive \
          -workspace "$SWFTPM_DIR" \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -archivePath ./build/App.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO
          
        # Sucht die gebaute .app-Datei im Archiv und kopiert sie in den Payload-Ordner
        APP_PATH=$(find ./build/App.xcarchive -name "*.app" -type d | head -n 1)
        echo "Kopiere App von: $APP_PATH"
        cp -R "$APP_PATH" build/Payload/
        
        # Verpackt das Ganze in die finale .ipa-Datei für dein iPhone
        cd build
        zip -r ../App.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iPhone-App
        path: App.ipa
